name: FWKarate2xx CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

  # 👇 Ejecución manual flexible
  workflow_dispatch:

    inputs:

      tags_expression:
        description: 'Karate tags expression'
        required: true
        default: '@smoke and not @perf'

      run_performance:
        description: 'Run performance tests'
        required: true
        default: 'false'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  # =========================================================
  # FUNCTIONAL TESTS
  # =========================================================

  functional-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      # =====================================================
      # Push / PR → Smoke default
      # =====================================================

      - name: Run functional tests (default)
        if: github.event_name != 'workflow_dispatch'
        run: ./gradlew apiTest -Ptags="@smoke and not @perf"

      # =====================================================
      # Manual → Dynamic tags
      # =====================================================

      - name: Run functional tests (manual)
        if: github.event_name == 'workflow_dispatch'
        run: ./gradlew apiTest -Ptags="${{ github.event.inputs.tags_expression }}" --info

      # =====================================================
      # Upload Karate Reports
      # =====================================================

      - name: Upload Karate Reports
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: build/karate-reports

  # =========================================================
  # PERFORMANCE TESTS
  # =========================================================

  performance-tests:

    needs: functional-tests

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      # =====================================================
      # Run performance only manually
      # =====================================================

      - name: Run performance tests
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance == 'true'
        run: ./gradlew performanceTest -Ptags=@perf

      # =====================================================
      # Prepare Gatling Site
      # =====================================================

      - name: Prepare Gatling Site
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance == 'true'
        run: |

          mkdir -p build/gatling-site

          latest=$(ls -td build/reports/gatling/* | head -1)

          cp -r "$latest"/* build/gatling-site/

      # =====================================================
      # Upload Gatling Reports
      # =====================================================

      - name: Upload Gatling Reports
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: build/gatling-site

      # =====================================================
      # Skip message
      # =====================================================

      - name: Skip performance tests
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.run_performance != 'true'
        run: |
          echo "Performance tests disabled"

  # =========================================================
  # DEPLOY REPORTS
  # =========================================================

  deploy-reports:

    needs:
      - performance-tests

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # =====================================================
      # Karate Reports
      # =====================================================

      - name: Download Karate Reports
        uses: actions/download-artifact@v4
        with:
          name: karate-reports
          path: site/karate

      # =====================================================
      # Gatling Reports
      # =====================================================

      - name: Download Gatling Reports
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.run_performance == 'true'
        uses: actions/download-artifact@v4
        with:
          name: gatling-report
          path: site/gatling

      # =====================================================
      # Upload Pages Artifact
      # =====================================================
      - name: Create QA Portal
        run: |

          cat <<EOF > site/index.html
          <!DOCTYPE html>
          <html>

          <head>

            <title>FWKarate2xx QA Portal</title>

            <style>

              body {
                background: #0f172a;
                color: white;
                font-family: Arial;
                text-align: center;
                padding-top: 100px;
              }

              h1 {
                margin-bottom: 50px;
              }

              .card {
                display: inline-block;
                width: 250px;
                margin: 20px;
                padding: 30px;
                border-radius: 15px;
                background: #1e293b;
                text-decoration: none;
                color: white;
                transition: 0.3s;
              }

              .card:hover {
                transform: scale(1.05);
              }

            </style>

          </head>

          <body>

            <h1>FWKarate2xx QA Portal</h1>

            <a class="card" href="./karate/">

              <h2>Karate Reports</h2>

              <p>Functional API Testing</p>

            </a>

            <a class="card" href="./gatling/">

              <h2>Gatling Reports</h2>

              <p>Performance Testing</p>

            </a>

          </body>

          </html>
          EOF


      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      # =====================================================
      # Deploy
      # =====================================================

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4