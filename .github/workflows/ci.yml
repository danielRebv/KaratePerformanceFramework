name: FWKarate2xx CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:

  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:

  functional-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run functional tests
        run: ./gradlew apiTest -Ptags=@smokes

      - name: Upload Karate Reports
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: build/karate-reports

  performance-tests:

    needs: functional-tests

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Grant execute permission
        run: chmod +x gradlew

      # 👇 Detectar simulations
      - name: Check performance simulations
        id: perfcheck
        run: |

          count=$(find src/test/java -name "*Simulation.java" | wc -l)

          echo "Found simulations: $count"

          if [ "$count" -eq "0" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
          else
            echo "exists=true" >> $GITHUB_OUTPUT
          fi


      - name: Run performance tests
        if: steps.perfcheck.outputs.exists == 'true'
        run: ./gradlew performanceTest -Ptags=@perf


      - name: Prepare Gatling Site
        if: steps.perfcheck.outputs.exists == 'true'
        run: |

          mkdir -p build/gatling-site

          latest=$(ls -td build/reports/gatling/* | head -1)

          cp -r "$latest"/* build/gatling-site/


      - name: Upload Gatling Reports
        if: steps.perfcheck.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: build/gatling-site

      #
      - name: Skip performance tests
        if: steps.perfcheck.outputs.exists == 'false'
        run: |
          echo "No Gatling simulations found"

  deploy-reports:

    needs:
      - performance-tests

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:


      - name: Download Karate Reports
        uses: actions/download-artifact@v4
        with:
          name: karate-reports
          path: site/karate


      - name: Download Gatling Reports
        uses: actions/download-artifact@v4
        with:
          name: gatling-report
          path: site/gatling


      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site


      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4